<!doctype html>

<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Chat UI Preview</title>
  <style>
    :root{
      --bg:#050505;
      --panel:rgba(255,255,255,.05);
      --border:rgba(255,255,255,.10);
      --text:#ffffff;
      --muted:rgba(255,255,255,.62);
      --accent:#dc2626;
      --accent2:#ef4444;
      --shadow:0 14px 40px rgba(0,0,0,.45);
    }
    *{box-sizing:border-box}
    html,body{height:100%}
    body{
      margin:0;
      color:var(--text);
      font-family:Arial, Helvetica, sans-serif;
      background:
        radial-gradient(circle at 20% 10%, rgba(239,68,68,.16), transparent 38%),
        radial-gradient(circle at 80% 40%, rgba(255,255,255,.08), transparent 45%),
        radial-gradient(circle at 30% 90%, rgba(239,68,68,.10), transparent 55%),
        linear-gradient(120deg, rgba(255,255,255,.04), transparent 35%, rgba(255,255,255,.03)),
        var(--bg);
    }
    .impact{font-family:Impact, Haettenschweiler, 'Arial Narrow Bold', sans-serif; letter-spacing:.02em}
    .app{max-width:1100px;margin:0 auto;padding:24px;position:relative}
    .hidden{display:none !important}
    .card{background:var(--panel);border:1px solid var(--border);border-radius:24px;box-shadow:var(--shadow);backdrop-filter:blur(12px)}
    .topbar{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:18px}
    .title{font-size:32px;color:var(--accent2)}
    .subtitle{font-size:12px;color:var(--muted);margin-top:4px}
    .topbar-actions{display:flex;gap:10px;align-items:center}
    .icon-btn,.send-btn,.attach-btn,.back-btn,.primary-btn{
      border:1px solid var(--border);
      background:rgba(255,255,255,.08);
      color:var(--text);
      border-radius:14px;
      padding:10px 12px;
      cursor:pointer;
      transition:.18s ease;
    }
    .primary-btn{background:var(--accent);border-color:var(--accent)}
    .icon-btn:hover,.attach-btn:hover,.back-btn:hover,.primary-btn:hover{background:rgba(255,255,255,.14);transform:translateY(-1px)}
    .primary-btn:hover{background:var(--accent2);border-color:var(--accent2)}
    .send-btn{background:var(--accent);border-color:var(--accent);min-width:56px}
    .send-btn:hover{background:var(--accent2);transform:translateY(-1px)}
    .send-btn:active,.icon-btn:active,.attach-btn:active,.back-btn:active,.primary-btn:active{transform:scale(.97)}
    .search-wrap{position:relative}
    .search,.composer-input,.modal-input,.modal-select{
      width:100%;background:rgba(0,0,0,.32);border:1px solid var(--border);color:var(--text);
      border-radius:14px;padding:12px 14px;outline:none;
    }
    .search{padding-left:40px}
    .search::placeholder,.composer-input::placeholder,.modal-input::placeholder{color:rgba(255,255,255,.4)}
    .search-icon{position:absolute;left:14px;top:50%;transform:translateY(-50%);color:var(--accent2)}
    .thread-list{display:flex;flex-direction:column;gap:10px;margin-top:16px}
    .thread{width:100%;text-align:left;padding:14px;border-radius:18px;border:1px solid var(--border);background:transparent;color:var(--text);cursor:pointer;transition:.18s ease}
    .thread:hover{background:rgba(255,255,255,.05)}
    .thread.active{border-color:var(--accent);background:rgba(255,255,255,.05)}
    .thread-row{display:flex;align-items:center;gap:12px}
    .avatar{height:42px;width:42px;border-radius:14px;background:rgba(255,255,255,.10);display:grid;place-items:center;font-weight:700}
    .thread-main{min-width:0;flex:1}
    .thread-name{font-size:20px;line-height:1;color:var(--text)}
    .thread.active .thread-name{color:var(--accent2)}
    .thread-sub{font-size:12px;color:var(--muted);margin-top:6px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .online{height:8px;width:8px;border-radius:999px;background:var(--accent)}
    .page-note{font-size:11px;color:rgba(255,255,255,.5);margin-top:14px}
    .chat-head{display:flex;align-items:center;gap:12px;padding:14px 16px;border-bottom:1px solid var(--border)}
    .chat-head-main{min-width:0;flex:1}
    .chat-name{font-size:24px;color:var(--accent2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .chat-role{font-size:12px;color:var(--muted);margin-top:4px}
    .messages{height:62vh;overflow:auto;padding:16px;display:flex;flex-direction:column;gap:14px}
    .row{display:flex;width:100%}
    .row.me{justify-content:flex-end}
    .row.other{justify-content:flex-start}
    .bubble{position:relative;max-width:min(78%,700px);padding:14px 16px;border-radius:20px;box-shadow:var(--shadow);transition:.18s ease;animation:fadeUp .28s ease}
    .bubble:hover{transform:scale(1.01)}
    .bubble.me{background:var(--accent);color:#fff}
    .bubble.other{background:rgba(255,255,255,.05);border:1px solid var(--border);color:var(--text)}
    .bubble-time{font-size:11px;margin-top:8px;opacity:.7}
    .reply-box{margin-bottom:10px;padding-left:10px;border-left:4px solid var(--accent2);font-size:12px;color:rgba(255,255,255,.72)}
    .hover-actions{position:absolute;top:-14px;right:10px;display:none;gap:8px;padding:6px 8px;border-radius:999px;background:rgba(0,0,0,.84);border:1px solid var(--border);backdrop-filter:blur(8px)}
    .bubble:hover .hover-actions{display:flex}
    .hover-actions button{background:none;border:none;color:var(--accent2);cursor:pointer;padding:0;font-size:14px}
    .attach-card{display:flex;align-items:center;gap:10px;border:1px solid var(--border);background:rgba(0,0,0,.28);border-radius:14px;padding:10px 12px;margin-bottom:10px;text-decoration:none;color:inherit}
    .attach-thumb{height:38px;width:38px;border-radius:12px;background:rgba(255,255,255,.10);display:grid;place-items:center;color:var(--accent2)}
    .attach-meta{min-width:0;flex:1}
    .attach-name{font-size:14px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .attach-size{font-size:12px;color:var(--muted);margin-top:4px}
    .image-wrap{margin-bottom:10px}
    .image-top{display:flex;align-items:center;gap:8px;font-size:12px;color:rgba(255,255,255,.75);margin-bottom:8px}
    .image-wrap img{display:block;max-width:100%;max-height:260px;object-fit:cover;border-radius:14px;border:1px solid var(--border)}
    .composer{border-top:1px solid var(--border);padding:14px;display:flex;flex-direction:column;gap:10px}
    .reply-preview,.pending-file{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:16px;border:1px solid var(--border);background:rgba(0,0,0,.28)}
    .reply-preview-main,.pending-file-main{min-width:0;flex:1}
    .reply-preview-text,.pending-file-name{font-size:12px;color:rgba(255,255,255,.72);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .reply-line{border-left:4px solid var(--accent2);padding-left:10px}
    .composer-row{display:flex;align-items:center;gap:10px}
    .tip{font-size:11px;color:rgba(255,255,255,.5)}
    .member-picker{padding:10px;border-radius:16px;max-height:220px;overflow:auto}
    .member-row{display:flex;align-items:center;gap:12px;padding:10px;border-radius:14px;border:1px solid var(--border);background:rgba(255,255,255,.03);cursor:pointer}
    .member-row input{accent-color:var(--accent)}
    .modal-backdrop{position:fixed;inset:0;background:rgba(0,0,0,.55);display:none;align-items:center;justify-content:center;padding:20px;z-index:1000}
    .modal-backdrop.show{display:flex}
    .modal{width:min(540px,100%);padding:18px}
    .modal-title{font-size:26px;color:var(--accent2);margin-bottom:6px}
    .modal-sub{font-size:12px;color:var(--muted);margin-bottom:14px}
    .modal-grid{display:grid;gap:10px}
    .modal-actions{display:flex;justify-content:flex-end;gap:10px;margin-top:14px}
    .dev-note{max-width:1100px;margin:10px auto 0;padding:0 24px;color:rgba(255,255,255,.55);font-size:12px}
    @keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
    @media (max-width: 700px){
      .app{padding:14px}
      .title{font-size:28px}
      .chat-name{font-size:20px}
      .messages{height:58vh}
      .bubble{max-width:88%}
      .topbar-actions{gap:8px}
    }
  </style>
</head>
<body>
  <div class="app">
    <section id="inboxPage">
      <div class="topbar">
        <div>
          <div class="title impact">INBOX</div>
          <div class="subtitle">All previous chats</div>
        </div>
        <div class="topbar-actions">
          <button id="newChatBtn" class="primary-btn impact" title="New Chat">NEW CHAT</button>
          <button class="icon-btn" title="Menu">⋯</button>
        </div>
      </div>

      <div class="card" style="padding:16px;">
        <div class="search-wrap">
          <span class="search-icon">⌕</span>
          <input id="searchInput" class="search" placeholder="Search chats" />
        </div>
        <div id="threadList" class="thread-list"></div>
       
      </div>
    </section>

    <section id="chatPage" class="hidden">
      <div class="card">
        <div class="chat-head">
          <button id="backBtn" class="back-btn" title="Back">←</button>
          <div id="chatAvatar" class="avatar">C</div>
          <div class="chat-head-main">
            <div id="chatName" class="chat-name impact">Chat</div>
            <div id="chatRole" class="chat-role">Offline • Direct</div>
          </div>
          <button class="icon-btn" title="Menu">⋯</button>
        </div>

        <div id="messages" class="messages"></div>

        <div class="composer">
          <div id="typingIndicator" class="tip hidden">Someone is typing...</div>

          <div id="replyPreview" class="reply-preview hidden">
            <div class="reply-preview-main reply-line">
              <div id="replyText" class="reply-preview-text">Replying to...</div>
            </div>
            <button id="cancelReplyBtn" class="icon-btn" title="Cancel reply">✕</button>
          </div>

          <div id="pendingFile" class="pending-file hidden">
            <div id="pendingIcon" class="attach-thumb">📎</div>
            <div class="pending-file-main">
              <div id="pendingName" class="pending-file-name">file.pdf</div>
              <div id="pendingSize" class="attach-size">0 KB</div>
            </div>
            <button id="removeFileBtn" class="icon-btn" title="Remove file">✕</button>
          </div>

          <div class="composer-row">
            <input id="fileInput" type="file" accept="image/*,.pdf,.doc,.docx,.xls,.xlsx,.ppt,.pptx,.txt,.zip" class="hidden" />
            <button id="attachBtn" class="attach-btn" title="Attach">📎</button>
            <input id="messageInput" class="composer-input" placeholder="Write a message…" />
            <button id="sendBtn" class="send-btn" title="Send">➤</button>
          </div>

          <div class="tip">Attach with the paperclip • Enter to send</div>
        </div>
      </div>
    </section>
  </div>

  <div id="newChatModal" class="modal-backdrop">
    <div class="card modal">
      <div class="modal-title impact">NEW CHAT</div>
      <div class="modal-sub">Create a direct or group chat from Wix members.</div>
      <div class="modal-grid">
        <select id="chatTypeSelect" class="modal-select">
          <option value="direct">Direct</option>
          <option value="group">Group</option>
        </select>
        <input id="chatTitleInput" class="modal-input" placeholder="Chat title (for group chats)" />
        <div id="memberPicker" class="card member-picker">
          <div id="memberPickerEmpty" class="tip">No members loaded yet.</div>
          <div id="memberPickerList" class="thread-list" style="margin-top:0;"></div>
        </div>
      </div>
      <div class="modal-actions">
        <button id="cancelNewChatBtn" class="icon-btn">Cancel</button>
        <button id="createNewChatBtn" class="primary-btn impact">CREATE</button>
      </div>
    </div>
  </div>

 

  <script>
    const DEFAULT_THEME = {
      clubSlug: 'default',
      accent: '#DC2626',
      accent2: '#EF4444',
      textColor: '#FFFFFF',
      border: 'rgba(255,255,255,.10)',
      panel: 'rgba(255,255,255,.05)',
      bg: '#050505'
    };

    const state = {
      theme: DEFAULT_THEME,
      memberId: '',
      page: 'inbox',
      threads: [
        { id: 't1', name: 'MDS Coaches', role: 'Group', initials: 'MC', online: true }
      ],
      activeId: 't1',
      messagesByThread: {
        t1: [
          { id: uid(), who: 'other', text: 'Nike-dark vibe for the portal? Keep it clean + performance.', ts: new Date() },
          { id: uid(), who: 'me', text: 'Yep. Minimal, bold + sharp accents. Feels fast.', ts: new Date() }
        ]
      },
      replyTo: null,
      pendingFile: null,
      typingUsers: {},
      availableMembers: [],
      selectedParticipantIds: []
    };

    const els = {
      inboxPage: document.getElementById('inboxPage'),
      chatPage: document.getElementById('chatPage'),
      threadList: document.getElementById('threadList'),
      searchInput: document.getElementById('searchInput'),
      newChatBtn: document.getElementById('newChatBtn'),
      newChatModal: document.getElementById('newChatModal'),
      chatTypeSelect: document.getElementById('chatTypeSelect'),
      chatTitleInput: document.getElementById('chatTitleInput'),
      memberPicker: document.getElementById('memberPicker'),
      memberPickerEmpty: document.getElementById('memberPickerEmpty'),
      memberPickerList: document.getElementById('memberPickerList'),
      cancelNewChatBtn: document.getElementById('cancelNewChatBtn'),
      createNewChatBtn: document.getElementById('createNewChatBtn'),
      backBtn: document.getElementById('backBtn'),
      chatAvatar: document.getElementById('chatAvatar'),
      chatName: document.getElementById('chatName'),
      chatRole: document.getElementById('chatRole'),
      messages: document.getElementById('messages'),
      typingIndicator: document.getElementById('typingIndicator'),
      replyPreview: document.getElementById('replyPreview'),
      replyText: document.getElementById('replyText'),
      cancelReplyBtn: document.getElementById('cancelReplyBtn'),
      pendingFile: document.getElementById('pendingFile'),
      pendingIcon: document.getElementById('pendingIcon'),
      pendingName: document.getElementById('pendingName'),
      pendingSize: document.getElementById('pendingSize'),
      removeFileBtn: document.getElementById('removeFileBtn'),
      fileInput: document.getElementById('fileInput'),
      attachBtn: document.getElementById('attachBtn'),
      messageInput: document.getElementById('messageInput'),
      sendBtn: document.getElementById('sendBtn')
    };

    let typingTimer = null;
    let lastTypingSent = 0;

    function uid(){ return Math.random().toString(16).slice(2) + Date.now().toString(16); }
    function norm(v){ return String(v == null ? '' : v).trim(); }
    function initials(name){ return String(name || 'C').split(' ').map(function(x){ return x[0]; }).slice(0,2).join('').toUpperCase(); }
    function timeLabel(d){ try { return new Intl.DateTimeFormat(undefined, { hour:'numeric', minute:'2-digit' }).format(new Date(d)); } catch (e) { return ''; } }
    function formatBytes(bytes){ if (!bytes) return '0 B'; const k = 1024; const sizes = ['B','KB','MB','GB']; const i = Math.min(Math.floor(Math.log(bytes)/Math.log(k)), sizes.length - 1); const v = bytes / Math.pow(k, i); return (v >= 10 || i === 0 ? v.toFixed(0) : v.toFixed(1)) + ' ' + sizes[i]; }
    function activeThread(){ return state.threads.find(function(t){ return t.id === state.activeId; }) || state.threads[0] || null; }
    function escapeHtml(str){ return String(str == null ? '' : str).replace(/[&<>"']/g, function(s){ return ({ '&':'&amp;', '<':'&lt;', '>':'&gt;', '"':'&quot;', "'":'&#39;' })[s]; }); }
    function escapeAttr(str){ return escapeHtml(str); }
    function postToWix(data){ try { window.parent.postMessage(data, '*'); } catch (e) {} }

    function normalizeColor(input){
      const c = norm(input).replace(/[;,]+$/g, '').trim();
      if (!c) return '';
      const hex = c.replace('#','');
      if (/^[0-9a-fA-F]{6}$/.test(hex)) return '#' + hex.toUpperCase();
      if (/^rgba?\(/i.test(c)) return c;
      if (/^[a-zA-Z]+$/.test(c)) return c;
      return '';
    }

    function hexToRgba(hex, alpha){
      const clean = String(hex || '').replace('#','').trim();
      if (!/^[0-9A-Fa-f]{6}$/.test(clean)) return 'rgba(239,68,68,' + alpha + ')';
      const r = parseInt(clean.slice(0,2), 16);
      const g = parseInt(clean.slice(2,4), 16);
      const b = parseInt(clean.slice(4,6), 16);
      return 'rgba(' + r + ',' + g + ',' + b + ',' + alpha + ')';
    }

    function buildThemePayload(input){
      const accent = normalizeColor(input && (input.accent || input.colorPrimary || input.primary)) || DEFAULT_THEME.accent;
      const accent2 = normalizeColor(input && (input.accent2 || input.secondary || input.colorPrimary)) || accent;
      const textColor = normalizeColor(input && (input.textColor || input.colorOnDark || input.text)) || DEFAULT_THEME.textColor;
      const border = normalizeColor(input && (input.border || input.colorNeutral)) || DEFAULT_THEME.border;
      const panel = normalizeColor(input && input.panel) || DEFAULT_THEME.panel;
      const bg = normalizeColor(input && (input.bg || input.background)) || DEFAULT_THEME.bg;
      const clubSlug = norm(input && (input.clubSlug || input.slug)) || 'default';
      return { clubSlug, accent, accent2, textColor, border, panel, bg };
    }

    function applyTheme(themeInput){
      const t = buildThemePayload(themeInput || {});
      state.theme = t;
      const root = document.documentElement.style;
      root.setProperty('--bg', t.bg);
      root.setProperty('--panel', t.panel);
      root.setProperty('--border', t.border);
      root.setProperty('--text', t.textColor);
      root.setProperty('--muted', 'rgba(255,255,255,.62)');
      root.setProperty('--accent', t.accent);
      root.setProperty('--accent2', t.accent2);
      document.body.style.background = [
        'radial-gradient(circle at 20% 10%, ' + hexToRgba(t.accent, 0.16) + ', transparent 38%)',
        'radial-gradient(circle at 80% 40%, rgba(255,255,255,.08), transparent 45%)',
        'radial-gradient(circle at 30% 90%, ' + hexToRgba(t.accent2, 0.10) + ', transparent 55%)',
        'linear-gradient(120deg, rgba(255,255,255,.04), transparent 35%, rgba(255,255,255,.03))',
        t.bg
      ].join(',');
    }

    function mapMember(m){
      const name = m.name || [m.firstName, m.lastName].filter(Boolean).join(' ') || m.email || 'Member';
      return {
        id: m._id || m.id,
        name: name,
        initials: m.initials || initials(name),
        role: m.role || ''
      };
    }

    function renderThreads(){
      const q = (els.searchInput.value || '').trim().toLowerCase();
      const list = !q ? state.threads : state.threads.filter(function(t){ return (t.name || '').toLowerCase().includes(q); });
      els.threadList.innerHTML = list.map(function(t){
        return `
          <button class="thread ${t.id === state.activeId ? 'active' : ''}" data-id="${escapeHtml(t.id)}">
            <div class="thread-row">
              <div class="avatar">${escapeHtml(t.initials || initials(t.name))}</div>
              <div class="thread-main">
                <div style="display:flex;align-items:center;gap:8px;">
                  <div class="thread-name impact">${escapeHtml(t.name || 'Untitled Chat')}</div>
                  ${t.online ? '<span class="online"></span>' : ''}
                </div>
                <div class="thread-sub">Tap to open chat</div>
              </div>
            </div>
          </button>
        `;
      }).join('');
      els.threadList.querySelectorAll('.thread').forEach(function(btn){
        btn.addEventListener('click', function(){
          const id = btn.getAttribute('data-id');
          openThread(id);
          postToWix({ type: 'OPEN_CHAT', chatId: id });
        });
      });
    }

    function renderMemberPicker(){
      const members = (state.availableMembers || []).filter(function(m){ return m && m.id && m.id !== state.memberId; });
      els.memberPickerEmpty.classList.toggle('hidden', members.length > 0);
      els.memberPickerList.innerHTML = members.map(function(m){
        const checked = state.selectedParticipantIds.includes(m.id);
        return `
          <label class="member-row">
            <input type="checkbox" data-member-id="${escapeHtml(m.id)}" ${checked ? 'checked' : ''} />
            <div class="avatar">${escapeHtml(m.initials || initials(m.name))}</div>
            <div class="thread-main">
              <div class="thread-name impact" style="font-size:16px;">${escapeHtml(m.name || 'Member')}</div>
              <div class="thread-sub">${escapeHtml(m.role || '')}</div>
            </div>
          </label>
        `;
      }).join('');

      els.memberPickerList.querySelectorAll('input[type="checkbox"]').forEach(function(box){
        box.addEventListener('change', function(){
          const id = box.getAttribute('data-member-id');
          if (!id) return;
          if (box.checked) {
            if (!state.selectedParticipantIds.includes(id)) state.selectedParticipantIds.push(id);
          } else {
            state.selectedParticipantIds = state.selectedParticipantIds.filter(function(x){ return x !== id; });
          }
        });
      });
    }

    function renderChatHead(){
      const t = activeThread();
      els.chatAvatar.textContent = (t && t.initials) || initials(t && t.name);
      els.chatName.textContent = (t && t.name) || 'Chat';
      els.chatRole.textContent = ((t && t.online) ? 'Online' : 'Offline') + ' • ' + ((t && t.role) || 'Direct');
    }

    function renderFileHtml(file){
      if (!file) return '';
      if (file.isImage) {
        return `
          <div class="image-wrap">
            <div class="image-top"><span>🖼</span><span>${escapeHtml(file.name || 'Image')}</span>${file.sizeLabel ? `<span style="margin-left:auto;opacity:.8">${escapeHtml(file.sizeLabel)}</span>` : ''}</div>
            <a href="${escapeAttr(file.url || '#')}" target="_blank" rel="noreferrer"><img src="${escapeAttr(file.url || '')}" alt="${escapeAttr(file.name || 'Image')}" /></a>
          </div>
        `;
      }
      return `
        <a class="attach-card" href="${escapeAttr(file.url || '#')}" target="_blank" rel="noreferrer">
          <div class="attach-thumb">📄</div>
          <div class="attach-meta">
            <div class="attach-name">${escapeHtml(file.name || 'Attachment')}</div>
            <div class="attach-size">${escapeHtml(file.sizeLabel || '')}</div>
          </div>
          <div class="attach-size">Open</div>
        </a>
      `;
    }

    function renderMessages(){
      const messages = state.messagesByThread[state.activeId] || [];
      els.messages.innerHTML = messages.map(function(msg){
        const replyHtml = msg.reply ? `<div class="reply-box">Replying to: ${escapeHtml(msg.reply.text || (msg.reply.file && msg.reply.file.name ? '📎 ' + msg.reply.file.name : ''))}</div>` : '';
        const fileHtml = renderFileHtml(msg.file || null);
        return `
          <div class="row ${msg.who === 'me' ? 'me' : 'other'}">
            <div class="bubble ${msg.who === 'me' ? 'me' : 'other'}" data-id="${escapeHtml(msg.id)}">
              <div class="hover-actions">
                <button data-action="reply" title="Reply">↩</button>
                <button data-action="copy" title="Copy">⧉</button>
                <button data-action="react" title="React">☺</button>
              </div>
              ${replyHtml}
              ${fileHtml}
              ${msg.text ? `<div>${escapeHtml(msg.text)}</div>` : ''}
              <div class="bubble-time">${escapeHtml(timeLabel(msg.ts))}</div>
            </div>
          </div>
        `;
      }).join('');
      els.messages.querySelectorAll('.bubble').forEach(function(node){
        const id = node.getAttribute('data-id');
        const msg = (state.messagesByThread[state.activeId] || []).find(function(m){ return m.id === id; });
        node.querySelectorAll('[data-action]').forEach(function(btn){
          btn.addEventListener('click', function(e){
            e.stopPropagation();
            const action = btn.getAttribute('data-action');
            if (action === 'reply') {
              state.replyTo = msg;
              renderComposerBits();
            } else if (action === 'copy') {
              navigator.clipboard.writeText((msg && msg.text) || (msg && msg.file && msg.file.name) || '');
            }
          });
        });
      });
      els.messages.scrollTop = els.messages.scrollHeight;
    }

    function renderTypingIndicator(){
      const activeTypers = Object.keys(state.typingUsers || {}).filter(function(key){ return state.typingUsers[key]; });
      if (activeTypers.length > 0) {
        els.typingIndicator.textContent = activeTypers.length === 1 ? 'Someone is typing...' : activeTypers.length + ' people are typing...';
        els.typingIndicator.classList.remove('hidden');
      } else {
        els.typingIndicator.classList.add('hidden');
      }
    }

    function renderComposerBits(){
      if (state.replyTo) {
        els.replyPreview.classList.remove('hidden');
        els.replyText.textContent = 'Replying to: ' + (state.replyTo.text || (state.replyTo.file && state.replyTo.file.name ? '📎 ' + state.replyTo.file.name : ''));
      } else {
        els.replyPreview.classList.add('hidden');
      }
      if (state.pendingFile) {
        els.pendingFile.classList.remove('hidden');
        els.pendingName.textContent = state.pendingFile.name || 'Attachment';
        els.pendingSize.textContent = state.pendingFile.sizeLabel || '';
        els.pendingIcon.textContent = state.pendingFile.isImage ? '🖼' : '📄';
      } else {
        els.pendingFile.classList.add('hidden');
      }
    }

    function render(){
      els.inboxPage.classList.toggle('hidden', state.page !== 'inbox');
      els.chatPage.classList.toggle('hidden', state.page !== 'chat');
      renderThreads();
      renderChatHead();
      renderMessages();
      renderComposerBits();
      renderTypingIndicator();
      renderMemberPicker();
    }

    function openThread(id){ state.activeId = id; state.page = 'chat'; state.replyTo = null; render(); }
    function backToInbox(){ state.page = 'inbox'; state.replyTo = null; render(); }
    function openNewChatModal(){ state.selectedParticipantIds = []; els.newChatModal.classList.add('show'); renderMemberPicker(); }
    function closeNewChatModal(){ els.newChatModal.classList.remove('show'); }

    function sendTyping(isTyping){
      const now = Date.now();
      if (isTyping && now - lastTypingSent < 1200) return;
      lastTypingSent = now;
      postToWix({ type:'TYPING', payload:{ chatId: state.activeId, isTyping: !!isTyping } });
    }

    function sendMessage(){
      const text = (els.messageInput.value || '').trim();
      if (!text && !state.pendingFile) return;
      const msg = { id: uid(), who:'me', text:text, ts:new Date(), reply:state.replyTo, file:state.pendingFile || null };
      state.messagesByThread[state.activeId] = (state.messagesByThread[state.activeId] || []).concat(msg);
      els.messageInput.value = '';
      const payloadFile = state.pendingFile ? Object.assign({}, state.pendingFile) : null;
      state.pendingFile = null;
      state.replyTo = null;
      sendTyping(false);
      render();
      postToWix({
        type:'SEND_MESSAGE',
        payload:{
          chatId: state.activeId,
          text:text,
          fileName:(payloadFile && payloadFile.name) || '',
          fileUrl:(payloadFile && payloadFile.url) || '',
          fileType:(payloadFile && payloadFile.type) || '',
          fileSize:(payloadFile && payloadFile.size) || 0
        }
      });
    }

    function createNewChat(){
      const type = els.chatTypeSelect.value || 'direct';
      const title = norm(els.chatTitleInput.value);
      const participantIds = (state.selectedParticipantIds || []).slice();
      postToWix({
        type:'CREATE_CHAT',
        payload:{ type:type, title:title, participantIds:participantIds }
      });
      closeNewChatModal();
      els.chatTitleInput.value = '';
      state.selectedParticipantIds = [];
      renderMemberPicker();
    }

    window.addEventListener('message', function(event){
      const data = event.data || {};

      if (data.type === 'APPLY_THEME') {
        applyTheme(data.theme || data.colors || { clubSlug: data.clubSlug || 'default', colorPrimary: data.colorPrimary, colorOnDark: data.colorOnDark, colorNeutral: data.colorNeutral });
        render();
      }

      if (data.type === 'LOAD_INBOX') {
        applyTheme(data.theme || data.colors || { clubSlug: data.clubSlug || 'default', colorPrimary: data.colorPrimary, colorOnDark: data.colorOnDark, colorNeutral: data.colorNeutral });
        state.memberId = data.memberId || '';
        state.availableMembers = (data.availableMembers || []).map(mapMember);
        state.threads = (data.chats || []).map(function(chat){
          return {
            id: chat._id || chat.id,
            name: chat.title || chat.name || 'Untitled Chat',
            role: chat.type || 'Direct',
            initials: initials(chat.title || chat.name || 'C'),
            online: !!chat.online
          };
        });
        if (state.threads[0]) state.activeId = state.threads[0].id;
        state.page = 'inbox';
        render();
      }

      if (data.type === 'TYPING_UPDATE') {
        if (data.chatId !== state.activeId) return;
        state.typingUsers = data.typingUsers || {};
        renderTypingIndicator();
      }

      if (data.type === 'LOAD_CHAT') {
        applyTheme(data.theme || data.colors || { clubSlug: data.clubSlug || 'default', colorPrimary: data.colorPrimary, colorOnDark: data.colorOnDark, colorNeutral: data.colorNeutral });
        state.memberId = data.memberId || state.memberId;
        if (Array.isArray(data.availableMembers)) {
          state.availableMembers = data.availableMembers.map(mapMember);
        }
        const chat = data.chat || null;
        const chatId = (chat && (chat._id || chat.id)) || data.chatId || state.activeId;
        if (chat) {
          const normalized = {
            id: chatId,
            name: chat.title || chat.name || 'Untitled Chat',
            role: chat.type || 'Direct',
            initials: initials(chat.title || chat.name || 'C'),
            online: !!chat.online
          };
          const idx = state.threads.findIndex(function(t){ return t.id === normalized.id; });
          if (idx >= 0) state.threads[idx] = normalized; else state.threads.unshift(normalized);
        }
        state.activeId = chatId;
        state.messagesByThread[chatId] = (data.messages || []).map(function(msg){
          return {
            id: msg._id || msg.id || uid(),
            who: msg.senderId && state.memberId ? (msg.senderId === state.memberId ? 'me' : 'other') : (msg.who || 'other'),
            text: msg.text || '',
            ts: msg.createdAt || msg.ts || new Date(),
            file: msg.fileUrl ? {
              url: msg.fileUrl,
              name: msg.fileName || 'Attachment',
              type: msg.fileType || '',
              size: msg.fileSize || 0,
              sizeLabel: msg.fileSize ? formatBytes(msg.fileSize) : '',
              isImage: String(msg.fileType || '').startsWith('image/')
            } : (msg.file || null),
            reply: msg.reply || null
          };
        });
        state.typingUsers = data.typingUsers || {};
        state.page = 'chat';
        render();
      }

      if (data.type === 'CHAT_CREATED') {
        if (Array.isArray(data.availableMembers)) {
          state.availableMembers = data.availableMembers.map(mapMember);
        }
        const newChatId = data.chatId;
        if (newChatId) {
          if (Array.isArray(data.chats)) {
            state.threads = data.chats.map(function(chat){
              return {
                id: chat._id || chat.id,
                name: chat.title || chat.name || 'Untitled Chat',
                role: chat.type || 'Direct',
                initials: initials(chat.title || chat.name || 'C'),
                online: !!chat.online
              };
            });
          }
          openThread(newChatId);
          postToWix({ type:'OPEN_CHAT', chatId:newChatId });
        }
      }
    });

    els.searchInput.addEventListener('input', renderThreads);
    els.newChatBtn.addEventListener('click', openNewChatModal);
    els.cancelNewChatBtn.addEventListener('click', closeNewChatModal);
    els.createNewChatBtn.addEventListener('click', createNewChat);
    els.newChatModal.addEventListener('click', function(e){ if (e.target === els.newChatModal) closeNewChatModal(); });
    els.backBtn.addEventListener('click', backToInbox);
    els.cancelReplyBtn.addEventListener('click', function(){ state.replyTo = null; renderComposerBits(); });
    els.attachBtn.addEventListener('click', function(){ els.fileInput.click(); });
    els.removeFileBtn.addEventListener('click', function(){ state.pendingFile = null; renderComposerBits(); });
    els.fileInput.addEventListener('change', function(e){
      const file = e.target.files && e.target.files[0];
      if (!file) return;
      const url = URL.createObjectURL(file);
      state.pendingFile = { name:file.name, size:file.size, sizeLabel:formatBytes(file.size), type:file.type, isImage:String(file.type || '').startsWith('image/'), url:url };
      e.target.value = '';
      renderComposerBits();
    });
    els.sendBtn.addEventListener('click', sendMessage);
    els.messageInput.addEventListener('input', function(){
      sendTyping(!!els.messageInput.value.trim());
      clearTimeout(typingTimer);
      typingTimer = setTimeout(function(){ sendTyping(false); }, 1500);
    });
    els.messageInput.addEventListener('keydown', function(e){ if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); } });

    console.assert(typeof uid() === 'string' && uid().length > 0, 'uid should return a non-empty string');
    console.assert(initials('MDS Coaches') === 'MC', 'initials should derive thread initials');
    console.assert(formatBytes(1024) === '1.0 KB', 'formatBytes should format KB values');
    console.assert(buildThemePayload({ colorPrimary:'#112233' }).accent === '#112233'.toUpperCase(), 'theme should map club colorPrimary');
    console.assert(buildThemePayload({ colorOnDark:'#F5F5F5' }).textColor === '#F5F5F5', 'theme should map colorOnDark');
    console.assert(buildThemePayload({ colorNeutral:'#222222' }).border === '#222222', 'theme should map colorNeutral');
    console.assert(Array.isArray(state.selectedParticipantIds), 'selectedParticipantIds should be an array');

    applyTheme(DEFAULT_THEME);
    render();
  </script>
</body>
</html>
